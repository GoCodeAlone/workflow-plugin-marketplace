version: 2
project_name: workflow-plugin-marketplace
before:
  hooks:
    - go mod tidy
    - "sed -i.bak -e 's/\"version\": \".*\"/\"version\": \"{{ .Version }}\"/' -e 's#/releases/download/v[^/]*/#/releases/download/v{{ .Version }}/#g' -e 's/workflow-plugin-marketplace_[0-9][0-9A-Za-z.~-]*/workflow-plugin-marketplace_{{ .Version }}/g' plugin.json && rm -f plugin.json.bak"
builds:
  - id: workflow-plugin-marketplace
    main: ./cmd/workflow-plugin-marketplace
    binary: workflow-plugin-marketplace
    env:
      - CGO_ENABLED=0
      - GOPRIVATE=github.com/GoCodeAlone/*
    ldflags:
      - "-s -w -X github.com/GoCodeAlone/workflow-plugin-marketplace/internal.Version={{ .Version }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: archive
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - plugin.json
      - plugin.contracts.json
checksum:
  name_template: "checksums.txt"
release:
  github:
    owner: GoCodeAlone
    name: workflow-plugin-marketplace
